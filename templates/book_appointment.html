<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Smart Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-clinic-medical"></i> Smart Clinic
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/patient/dashboard">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-calendar-plus"></i> Book New Appointment</h4>
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }}">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST" id="bookingForm">
                            <div class="mb-3">
                                <label class="form-label">Select Doctor *</label>
                                <select class="form-control" name="doctor_id" id="doctor_id" required>
                                    <option value="">Choose a doctor</option>
                                    {% for doctor in doctors %}
                                    <option value="{{ doctor.id }}">{{ doctor.name }} - {{ doctor.specialization }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Appointment Date *</label>
                                <input type="date" class="form-control" name="appointment_date" id="appointment_date" 
                                       min="{{ today }}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Available Time Slots</label>
                                <select class="form-control" name="slot" id="slot" required>
                                    <option value="">Select a doctor and date first</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Patient Age *</label>
                                <input type="number" class="form-control" name="patient_age" required min="0" max="120">
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Reason for Visit *</label>
                                <textarea class="form-control" name="patient_reason" rows="3" required 
                                          placeholder="Describe your symptoms or reason for appointment"></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Payment Method *</label>
                                <select class="form-control" name="payment_method" required>
                                    <option value="">Select payment method</option>
                                    <option value="Credit Card">Credit Card</option>
                                    <option value="Debit Card">Debit Card</option>
                                    <option value="Cash">Cash</option>
                                    <option value="Insurance">Insurance</option>
                                    <option value="UPI">UPI</option>
                                </select>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-check"></i> Book Appointment
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('appointment_date').min = today;
        
        let doctorSelect = document.getElementById('doctor_id');
        let dateInput = document.getElementById('appointment_date');
        let slotSelect = document.getElementById('slot');
        
        async function loadSlots() {
            const doctorId = doctorSelect.value;
            const date = dateInput.value;
            
            if (doctorId && date) {
                slotSelect.innerHTML = '<option value="">Loading slots...</option>';
                try {
                    const response = await fetch(`/get_slots/${doctorId}/${date}`);
                    const data = await response.json();
                    
                    if (data.slots && data.slots.length > 0) {
                        slotSelect.innerHTML = '<option value="">Select a time slot</option>';
                        data.slots.forEach(slot => {
                            slotSelect.innerHTML += `<option value="${slot}">${slot}</option>`;
                        });
                    } else {
                        slotSelect.innerHTML = '<option value="">No slots available for this date</option>';
                    }
                } catch (error) {
                    slotSelect.innerHTML = '<option value="">Error loading slots</option>';
                }
            } else {
                slotSelect.innerHTML = '<option value="">Select a doctor and date first</option>';
            }
        }
        
        doctorSelect.addEventListener('change', loadSlots);
        dateInput.addEventListener('change', loadSlots);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
